<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw · Toolkit</title>
<style>
  :root{
    --bg:#0b0d12; --bg-2:#12151d; --panel:#161a24; --panel-2:#1d2230;
    --border:#262c3b; --border-2:#313849;
    --text:#e8ecf3; --text-dim:#9aa3b7; --text-muted:#6b7389;
    --accent:#7c9cff; --accent-2:#62e0c7;
    --danger:#ff6b7a; --warn:#ffc560; --ok:#62e0c7;
    --shadow: 0 10px 40px rgba(0,0,0,.35);
    --radius: 14px; --radius-sm: 10px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f6f7fb; --bg-2:#eceff7; --panel:#ffffff; --panel-2:#f1f4fb;
      --border:#e3e7f1; --border-2:#d1d7e5;
      --text:#1b2030; --text-dim:#52607a; --text-muted:#8a93a8;
      --accent:#3e63dd; --accent-2:#1eaa8c;
      --shadow: 0 8px 30px rgba(30,40,70,.08);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;font-size:14px;line-height:1.55}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit}

  .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

  .sidebar{background:var(--bg-2);border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:8px 10px 18px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .brand-logo{width:36px;height:36px;border-radius:10px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.25);background:#f5ead8}
  .brand-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .brand-title{font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand-sub{font-size:11px;color:var(--text-muted);margin-top:2px}

  .nav-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:14px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;transition:background .15s ease,color .15s ease}
  .nav-item:hover{background:var(--panel);color:var(--text)}
  .nav-item.active{background:linear-gradient(180deg,rgba(124,156,255,.15),rgba(124,156,255,.05));color:var(--text);border:1px solid rgba(124,156,255,.25)}
  .nav-item .ico{width:18px;height:18px;flex:0 0 18px;color:var(--accent)}
  .nav-item.disabled{opacity:.45;cursor:not-allowed}
  .sidebar-foot{margin-top:auto;padding:12px 10px 0;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}

  .main{padding:28px 36px 80px;max-width:1200px;width:100%;margin:0 auto}
  .page-header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .page-title{font-size:22px;font-weight:700;margin:0}
  .page-sub{color:var(--text-dim);margin-top:6px;font-size:13px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--panel-2);border:1px solid var(--border);border-radius:999px;font-size:11px;color:var(--text-dim)}
  .badge.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok)}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
  .card + .card{margin-top:18px}
  .card h3{margin:0 0 12px;font-size:14px;font-weight:600;color:var(--text)}
  .card .desc{color:var(--text-dim);font-size:12.5px;margin-bottom:14px}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:1px solid var(--border-2);background:var(--panel-2);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s ease}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#5a7aeb);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(124,156,255,.25)}
  .btn.primary:hover{filter:brightness(1.08);color:#fff}
  .btn.ghost{background:transparent}

  @media (max-width:820px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  }

  /* ===== HTML 在线运行 ===== */
  main.main.htmlrun-active{max-width:none;padding:18px 24px 24px}
  main.main.htmlrun-active #tool-htmlrun .page-header{margin-bottom:12px}
  main.main.htmlrun-active #tool-htmlrun .card{padding:14px 18px}

  /* HTML runner: card width follows input area */
  main.main.htmlrun-active #tool-htmlrun .card.htmlrun-card{
    width:100%;
    max-width:none;
    margin:0;
  }

  .htmlrun-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 260px);min-height:520px;transition:all .25s ease}
  .htmlrun-split.collapsed{grid-template-columns:1fr}
  .htmlrun-split.collapsed .htmlrun-preview{display:none}
  .htmlrun-input{width:100%;height:100%;font-family:"JetBrains Mono","Fira Code",Consolas,Menlo,monospace;font-size:13.5px;line-height:1.6;padding:18px 22px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);resize:none;outline:none;overflow:auto;tab-size:2;white-space:pre;transition:border-color .15s ease}
  .htmlrun-input:focus{border-color:var(--accent)}
  .htmlrun-preview{width:100%;height:100%;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;overflow:auto}
  .htmlrun-toggle-preview{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--border-2);background:var(--panel-2);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s ease}
  .htmlrun-toggle-preview:hover{border-color:var(--accent);color:var(--accent)}
  .htmlrun-toggle-preview.active{background:rgba(124,156,255,.12);border-color:rgba(124,156,255,.35);color:var(--accent)}
  @media (max-width: 980px){
    .htmlrun-split{grid-template-columns:1fr;height:auto;min-height:420px}
    .htmlrun-preview{display:none}
  }

  .md-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .md-toolbar .spacer{flex:1}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo"><img src="./assets/logo.jpg" alt="Logo"></div>
      <div>
        <div class="brand-title">OpenClaw Toolkit</div>
        <div class="brand-sub">个人工具集 · v0.1</div>
      </div>
    </div>
    <div class="nav-label">工具</div>
    <div class="nav-item active" data-tool="jsonl2xlsx">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M16 13H8M16 17H8M10 9H8"></path></svg>
      <span>评测 JSONL → Excel</span>
    </div>
    <div class="nav-item" data-tool="markdown">
      <svg class="ico" viewBox="0 0 16 16" fill="currentColor"><path d="M14.85 3H1.15C.52 3 0 3.52 0 4.15v7.69C0 12.48.52 13 1.15 13h13.69c.64 0 1.15-.52 1.15-1.15v-7.7C16 3.52 15.48 3 14.85 3zM9 11H7V8L5.5 9.92 4 8v3H2V5h2l1.5 2L7 5h2v6zm2.99.5L9.5 8H11V5h2v3h1.5l-2.51 3.5z"></path></svg>
      <span>Markdown 转译</span>
    </div>
    <div class="nav-item" data-tool="htmlrun">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
      <span>HTML 在线运行</span>
    </div>
    <div class="nav-item disabled" title="敬请期待">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      <span>敬请期待</span>
    </div>
    <div class="sidebar-foot">
      <div>🤖 Made locally</div>
      <div style="margin-top:4px">静态页面 · 全部在浏览器里本地完成</div>
    </div>
  </aside>

  <main class="main">
    <section id="tool-jsonl2xlsx">
      <div class="page-header">
        <div>
          <h1 class="page-title">评测 JSONL → Excel 转换器</h1>
          <div class="page-sub">把 Langfuse 评测导出的 .jsonl 整理成结构化 Excel。数据不离开本机。</div>
        </div>
      </div>
    </section>

    <!-- ====== HTML Runner ====== -->
    <section id="tool-htmlrun" hidden="">
      <div class="page-header">
        <div>
          <h1 class="page-title">HTML 在线运行</h1>
          <div class="page-sub">在下方输入 HTML / CSS / JS，点击运行会在新标签页里打开。</div>
        </div>
        <div class="header-right">
          <span class="badge dot">纯前端</span>
        </div>
      </div>
      <div class="card htmlrun-card">
        <div class="md-toolbar">
          <button class="btn primary" id="htmlBtnRun">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            运行（新窗口）
          </button>
          <button class="btn" id="htmlBtnSample">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>
            插入示例
          </button>
          <button class="btn ghost" id="htmlBtnClear">清空</button>
          <button class="htmlrun-toggle-preview active" id="htmlBtnTogglePreview" title="切换实时预览">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18M9 21V9"></path></svg>
            预览
          </button>
          <div class="spacer"></div>
          <span id="htmlStatLen" class="badge">0 字符</span>
        </div>
        <div class="htmlrun-split" id="htmlrunSplit">
          <textarea id="htmlInput" class="md-input htmlrun-input" spellcheck="false" placeholder="在这里输入 HTML 代码 …  （Ctrl/Cmd + Enter 运行）"></textarea>
          <iframe id="htmlPreview" class="htmlrun-preview" sandbox="allow-scripts allow-same-origin allow-popups allow-modals allow-forms" title="HTML 预览"></iframe>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
// ====== Tool switch (sidebar nav) ======
(function(){
  const navs = document.querySelectorAll('.nav-item[data-tool]');
  const sections = document.querySelectorAll('section[id^="tool-"]');
  const main = document.querySelector('main.main');
  function show(tool){
    navs.forEach(n => {
      if(n.classList.contains('disabled')) return;
      n.classList.toggle('active', n.dataset.tool === tool);
    });
    sections.forEach(s => { s.hidden = s.id !== 'tool-' + tool; });
    if(main) main.classList.toggle('htmlrun-active', tool === 'htmlrun');
  }
  navs.forEach(n => {
    n.addEventListener('click', () => {
      if(n.classList.contains('disabled')) return;
      show(n.dataset.tool);
    });
  });
  // Show htmlrun by default for this preview
  show('htmlrun');
})();

// ====== HTML 在线运行 ======
(function(){
  const input = document.getElementById('htmlInput');
  const btnRun = document.getElementById('htmlBtnRun');
  const btnSample = document.getElementById('htmlBtnSample');
  const btnClear = document.getElementById('htmlBtnClear');
  const statLen = document.getElementById('htmlStatLen');
  const preview = document.getElementById('htmlPreview');
  const btnToggle = document.getElementById('htmlBtnTogglePreview');
  const split = document.getElementById('htmlrunSplit');
  const card = document.querySelector('.card.htmlrun-card');
  if(!input) return;

  // Live preview into iframe via blob URL (scripts run properly)
  function updatePreview(){
    if(!preview || split.classList.contains('collapsed')) return;
    const code = input.value || '';
    const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    preview.src = url;
    // revoke after a delay to avoid breaking the loaded page
    setTimeout(() => URL.revokeObjectURL(url), 60_000);
  }

  // Toggle preview panel — card width follows input
  let previewOn = true;
  try { previewOn = localStorage.getItem('htmlrun_preview') !== '0'; } catch(e){}
  function applyPreviewState(){
    split.classList.toggle('collapsed', !previewOn);
    btnToggle.classList.toggle('active', previewOn);
    if(previewOn) updatePreview();
  }
  applyPreviewState();

  btnToggle.addEventListener('click', () => {
    previewOn = !previewOn;
    try { localStorage.setItem('htmlrun_preview', previewOn ? '1' : '0'); } catch(e){}
    applyPreviewState();
  });

  let previewDebounce;

  const SAMPLE_HTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Hello HTML Runner</title>
  <style>
    :root{color-scheme:light dark}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",system-ui,sans-serif;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
    .card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);
          padding:40px 60px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.25);
          text-align:center;border:1px solid rgba(255,255,255,.2)}
    h1{margin:0 0 12px;font-size:36px;letter-spacing:.5px}
    p{margin:0 0 24px;opacity:.85;font-size:15px}
    button{padding:10px 28px;font-size:15px;border:none;border-radius:999px;
           background:#fff;color:#764ba2;cursor:pointer;font-weight:600;
           transition:transform .15s,box-shadow .15s}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.25)}
    #count{margin-top:16px;font-size:13px;opacity:.7}
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, HTML Runner! 🚀</h1>
    <p>这是一段可以直接在浏览器里跑的 HTML / CSS / JS 示例。</p>
    <button id="btn">点我 +1</button>
    <div id="count">点击次数：0</div>
  </div>
  <script>
    let n = 0;
    const btn = document.getElementById('btn');
    const out = document.getElementById('count');
    btn.addEventListener('click', () => {
      n++;
      out.textContent = '点击次数：' + n;
      btn.style.transform = 'scale(.94)';
      setTimeout(() => btn.style.transform = '', 120);
    });
  <\/script>
</body>
</html>`;

  function openInNewWindow(){
    const code = input.value.trim();
    if(!code){ updateStatus('代码为空', true); return; }
    const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if(!w){ updateStatus('弹窗被浏览器拦截了，请允许弹出窗口', true); return; }
    setTimeout(() => URL.revokeObjectURL(url), 60_000);
  }

  function updateStatus(msg, isErr){
    const len = input.value.length;
    statLen.textContent = msg || `${len.toLocaleString()} 字符`;
    statLen.classList.toggle('err', !!isErr);
    if(msg){
      setTimeout(() => {
        statLen.textContent = `${input.value.length.toLocaleString()} 字符`;
        statLen.classList.remove('err');
      }, 2400);
    }
  }

  input.addEventListener('input', () => {
    updateStatus();
    clearTimeout(previewDebounce);
    previewDebounce = setTimeout(updatePreview, 300);
  });
  btnRun.addEventListener('click', openInNewWindow);
  btnSample.addEventListener('click', () => {
    input.value = SAMPLE_HTML;
    updateStatus();
    input.focus();
    updatePreview();
  });
  btnClear.addEventListener('click', () => {
    input.value = '';
    updateStatus();
    input.focus();
    updatePreview();
  });

  input.addEventListener('keydown', (e) => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      openInNewWindow();
    }
  });

  updateStatus();
})();
</script>
</body>
</html>
